# config/appliance.yaml
# Generated by COSA setup — 2026-03-29T20:43:27.360Z
appliance:
  name: "Hanuman Thai Cafe"
  timezone: "America/New_York"

ssh:
  host: "192.168.1.248"
  port: 22
  user: "baanbaan"
  key_path: "/home/cosa/.ssh/id_ed25519_cosa"
  host_key_fingerprint: "SHA256:ye0zMzmC0bp9MsfrLKD4D+87kbSTC+DehYt7YvMf4rg="
  connect_timeout_ms: 5000
  command_timeout_ms: 30000

appliance_api:
  base_url: "http://192.168.1.248:3000"
  health_endpoint: "/health"
  health_ready_endpoint: "/health/ready"
  request_timeout_ms: 10000
  status_endpoint: "/api/status"
  status_poll_interval_s: 60

  auth:
    type: "jwt"
    login_endpoint: "/api/auth/login"
    login_body_template: '{"email":"${credential:appliance_email}","password":"${credential:appliance_password}"}'
    refresh_endpoint: "/api/auth/refresh"
    refresh_body_template: '{"refreshToken":"${credential:appliance_refresh_token}"}'
    access_token_ttl_minutes: 15
    access_token_credential_key: "appliance_access_token"
    refresh_token_credential_key: "appliance_refresh_token"

  api_endpoints:
    - name: "update_order_status"
      path: "/api/merchants/:merchantId/orders/:orderId/status"
      method: PATCH
      risk: medium
      description: "Transition an order to a new status"
      path_params:
        merchantId: "${credential:appliance_merchant_id}"
        orderId: caller
      body_schema:
        type: object
        properties:
          status:
            type: string
            enum: [confirmed, preparing, ready, completed, cancelled]
          note:
            type: string
        required: [status]

    - name: "pause_store"
      path: "/api/merchants/:merchantId/store/pause"
      method: PATCH
      risk: high
      description: "Pause or resume online ordering"
      path_params:
        merchantId: "${credential:appliance_merchant_id}"
      body_schema:
        type: object
        properties:
          paused:
            type: boolean
          reason:
            type: string
        required: [paused, reason]


database:
  path: "/home/baanbaan/baan-baan-merchant/v2/data/merchant.db"
  read_only: true

process_supervisor:
  type: "systemd"
  service_name: "baanbaan"

operator:
  email: "jdubray@gmail.com"
  name: "J"
  approval_timeout_minutes: 30
  urgent_approval_timeout_minutes: 5
  # Quiet hours: no approval emails are sent before this local hour (24-h clock).
  # The restaurant is closed overnight; non-urgent cron actions can wait until morning.
  # Set to 0 to disable.
  quiet_hours_start: 8
  # Rate limits: maximum one approval email per interval across all pending requests.
  # Non-urgent (medium-risk cron) emails are batched at most once per hour.
  # Urgent (high/critical) emails are sent at most once every 15 minutes.
  non_urgent_resend_interval_minutes: 60
  urgent_resend_interval_minutes: 15
  # Hard cap on outbound emails per calendar day (UTC).
  # Gmail's limit is 500/day; 50 leaves headroom and catches runaway loops early.
  daily_send_limit: 50

cron:
  # Public IP monitor — runs every 2 minutes, 24/7.
  # Detects internet outages and IP changes; updates BaanBaan .env on recovery.
  internet_ip_watch: "*/2 * * * *"
  # Adaptive health-check windows (override individual keys to adjust):
  #   health_check_lunch:  11 AM–2 PM every 30 min  (peak lunch)
  #   health_check_midday: 2 PM–5 PM every hour     (afternoon lull)
  #   health_check_dinner: 5 PM–9 PM every 30 min   (peak dinner)
  #   No health checks outside these windows (closed hours).
  health_check_lunch:  "0,30 11-13 * * *"
  health_check_midday: "0 14-16 * * *"
  health_check_dinner: "0,30 17-20 * * *"
  appliance_status_poll: "*/5 8-21 * * *"

tools:
  health_check:
    enabled: true
    http_check: false  # BaanBaan API binds to 127.0.0.1:3000 (localhost only); unreachable from COSA
    process_check: true
    ssh_connectivity_check: true
  db_query:
    enabled: true
    max_row_return: 100
    query_timeout_ms: 15000
  db_integrity:
    enabled: true
    run_wal_checkpoint: true
  backup_run:
    enabled: true
    backup_dir: "/tmp/cosa-backups"
    timeout_s: 120
    # Absolute path required: non-interactive SSH shells don't source bun's
    # PATH additions, so `bun` alone resolves to "command not found".
    js_runtime: "/home/baanbaan/.bun/bin/bun"
    tables:
      - orders
      - payments
      - payment_errors
      - merchants
      - menu_items
      - employees
      - timesheets
      - reservations
      - feedback
  restart_appliance:
    enabled: true
    graceful_timeout_seconds: 60
  post_session_hook:
    enabled: true
    min_tool_calls_for_skill: 3
  cloudflare_kill:
    enabled: true
  network_scan:
    enabled: true
  webhook_hmac_verify:
    enabled: true
    endpoint: "/api/webhooks/pos/test-merchant"
  compliance_verify:
    enabled: true
    sensitive_files:
      - "/home/baanbaan/baan-baan-merchant/v2/.env"
      - "/home/baanbaan/baan-baan-merchant/v2/data/merchant.db"
  pci_assessment:
    enabled: true
  settings_write:
    enabled: true
    allowed_keys:
      - operator_name
      - operator_email
      - timezone
      - station_notes
      - maintenance_mode
  credential_audit:
    enabled: true
    repo_path: "/home/baanbaan/baan-baan-merchant/v2"
    # Suppression entries match by (pattern, file, [line]):
    #   - pattern + file + line : exact single-line suppression
    #   - pattern + file        : whole-file suppression (line omitted)
    #   - pattern + file ending in '/' : directory-prefix suppression
    suppressed_findings:
      # AWS access key: canonical AWS docs example (AKIAIOSFODNN7EXAMPLE) in the
      # backup-test fixture. File-level (line drifts as the test evolves).
      - pattern: aws_access_key
        file: test/backup.test.ts
        reason: "AKIAIOSFODNN7EXAMPLE — canonical AWS documentation example key; non-functional"

      # Test fixtures: unit tests create ephemeral test users with hardcoded
      # passwords. None reach production; blanket-suppress the whole tree.
      - pattern: password_assignment
        file: test/
        reason: "Bun unit test fixtures; test-user credentials, never live"
      - pattern: password_assignment
        file: e2e/
        reason: "Playwright e2e fixtures; ephemeral test accounts, never live"
      - pattern: base64_secret
        file: e2e/
        reason: "e2e test artifacts (sandbox session tokens). gift-card-debug-results.json scheduled for git removal via docs/baanbaan_gitignore_credential_cleanup_spec.md"

      # Application-code false positives (whole-file suppression).
      - pattern: password_assignment
        file: public/js/app.js
        reason: "JS state variables initialised to null and populated from form inputs; not hardcoded credentials"
      - pattern: password_assignment
        file: public/js/dashboard.js
        reason: "Finix form-input read (document.getElementById('finix-password-input').value); not a hardcoded credential"
      - pattern: password_assignment
        file: src/routes/merchants.ts
        reason: "receiptEmailPassword is user-supplied SMTP config; webhook secret uses randomBytes(32)+AES-256-GCM — correct pattern"
      - pattern: base64_secret
        file: src/routes/merchants.ts
        reason: "base64 usage is part of AES-256-GCM encryption helpers, not a stored secret"

      # Marketing engine (tools/marketing-engine/) — Hono service for hanuman-kirkland.com.
      # All four findings are auth-code patterns: function parameters, login-form
      # input, and CLI argv. Argon2id via Bun.password — no stored plaintext.
      - pattern: password_assignment
        file: tools/marketing-engine/src/services/auth.ts
        reason: "hashPassword/verifyPassword take password as a function parameter; Argon2id via Bun.password — correct hashing pattern, no stored plaintext"
      - pattern: password_assignment
        file: tools/marketing-engine/src/routes/marketing.ts
        reason: "admin login route reads password from request body and verifies against password_hash column; never stored plaintext"
      - pattern: password_assignment
        file: tools/marketing-engine/src/scripts/seed-admin.ts
        reason: "admin seed CLI; password supplied via process.argv[3] at runtime, hashed before INSERT into admin_users"
  tunnel_health_check:
    enabled: true
    # NOTE: apex `hanuman-kirkland.com` has no A record at Cloudflare DNS
    # (only www. and qr. are wired up in the public DNS zone, even though
    # cloudflared.config.yml lists the apex as an ingress hostname).
    # Probe the resolvable www. host until/unless apex DNS is added.
    url: "https://www.hanuman-kirkland.com/"
    timeout_ms: 10000
    # HTTP statuses considered healthy. Cloudflare 521/522/523 (origin down /
    # connection timeout / unreachable) are 5xx and trigger an alert; so does
    # any fetch rejection (DNS, TLS, network).
    expected_status_max: 499
  access_log_scan:
    enabled: false
    log_path: "/var/log/nginx/access.log"
    lookback_minutes: 380
  git_audit:
    enabled: true
    repo_path: "/home/baanbaan/baan-baan-merchant/v2"
    lookback_hours: 8
    expected_authors:
      - "baanbaan@local"
  appliance_status_poll:
    enabled: true
    watcher_timeout_ms: 200
    alert_cooldown_minutes: 30
  shift_report:
    enabled: true
  backup_verify:
    enabled: true
  session_search:
    enabled: true
  archive_search:
    enabled: true
  process_monitor:
    enabled: true
  ips_alert:
    enabled: true
  jwt_secret_check:
    enabled: true
  token_rotation_remind:
    enabled: true
  pause_appliance:
    enabled: true
  appliance_api_call:
    enabled: true
  watcher_register:
    enabled: true
  watcher_list:
    enabled: true
  watcher_remove:
    enabled: true
  watcher_set_enabled:
    enabled: true
  internet_ip_check:
    enabled: true
  internet_ip_watch:
    enabled: true
    # Absolute path to BaanBaan's .env file on the appliance.
    env_file_path: "/home/baanbaan/baan-baan-merchant/v2/.env"
    # List of .env keys whose values should be updated with the new public IP.
    # Comma-separated list values are handled correctly: only the old IP entry
    # is replaced in place; all other IPs in the list are preserved.
    watched_keys:
      - ALLOWED_MERCHANT_IPS
    # Restart the BaanBaan service after updating .env so the change takes effect.
    restart_service_on_change: true
    service_name: "baanbaan"

network:
  # MAC addresses of devices that are authorized on the local network.
  # Each entry has a mac (colon-separated, lowercase) and an optional name.
  #
  # Baseline captured 2026-04-20 after the first successful network_scan
  # (previously failing because `arp` was not installed on the Pi).
  # The cafe-router and BaanBaan Pi entries are verified. The remaining
  # four entries are trust-on-first-use — the OUIs match commercial
  # restaurant gear (Sony on 00:11:62 = likely POS receipt printers;
  # the others suspected delivery tablets / Clover POS) and the cafe
  # operator has confirmed "most likely printers, delivery tablets,
  # Clover POS". Walk the cafe and correlate each IP to a physical
  # device to replace "suspected" labels with actual names.
  known_mac_addresses:
    - mac: "cc:32:e5:01:c8:92"
      name: "Cafe router / gateway (192.168.1.1)"
    - mac: "2c:cf:67:45:ac:8f"
      name: "BaanBaan Pi (self, 192.168.1.248)"
    - mac: "00:11:62:2b:27:57"
      name: "Sony device @ 192.168.1.179 (suspected printer/POS; web admin on :80)"
    - mac: "00:11:62:45:49:15"
      name: "Sony device @ 192.168.1.217 (suspected printer/POS; web admin on :80)"
    - mac: "88:a2:9e:66:f3:4e"
      name: "Cafe device @ 192.168.1.144 (suspected delivery tablet or Clover POS)"
    - mac: "c8:6e:08:e4:e2:60"
      name: "Cafe device @ 192.168.1.122 (suspected delivery tablet or Clover POS)"
    - mac: "b6:d4:f1:76:fc:29"
      name: "Cafe device on wlan0 (suspected DoorDash tablet)"

monitoring:
  # Processes expected to be running at all times on this appliance.
  # Each entry is matched against the COMMAND column of `ps aux` output
  # using substring containment (case-sensitive).
  # Add any additional legitimate processes your appliance runs.
  expected_processes:
    # BaanBaan application
    - bun
    # Chromium / Puppeteer (PDF export) — covers main process + renderer/gpu/utility/crashpad children
    - chromium
    # SSH
    - sshd
    - sshd-session
    - ssh-agent
    # Init and process supervision
    - systemd
    - init
    - (sd-pam)
    # Console login (multi-user.target)
    - login
    - agetty
    # Shells and transient commands
    - bash
    - sh
    - ps
    - journalctl
    # Kernel threads (commands enclosed in square brackets, e.g. [kworker/0:0])
    - "["
    # Print spooler (receipt printing)
    - cupsd
    - cups-browsed
    # System daemons
    - cron
    - udisksd
    - NetworkManager
    - wpa_supplicant
    - upowerd
    - accounts-daemon
    # D-Bus and system services
    - dbus-daemon
    - avahi-daemon
    - polkitd
    - fusermount
    # Cloudflare tunnel
    - cloudflared
    # Music file server (LAN-only sync endpoint for in-cafe Android app on :8080)
    - gunicorn
  # Ports that are legitimately open on this appliance (numeric).
  # Note: Chromium CDP (remote-debugging-port=0) uses an ephemeral loopback port
  # each run — it is NOT listed here because the port number changes every time.
  # Both the process-monitor and compliance-verify tools suppress localhost-only
  # ports owned by expected processes (like chromium) automatically.
  known_ports:
    - 22    # sshd
    - 3000  # baanbaan API (localhost only)
    - 3100  # marketing-engine.service — cloudflared ingress for hanuman-kirkland.com (currently *:3100, see docs/baanbaan_marketing_engine_loopback_bind_spec.md)
    - 8080  # music file server — LAN-only sync endpoint for the in-cafe Android background app reading from music/
    - 20241 # cloudflared management interface (localhost only)
    - 631   # CUPS print spooler (localhost only)

security:
  # Set to false when using a non-Gmail IMAP provider (Outlook, custom domain, etc.)
  # that does not inject Authentication-Results headers.  Defaults to true (Gmail).
  dkim_check: true
  dangerous_commands:
    - pattern: "rm\\s+-rf"
      reason: "Recursive delete"
    - pattern: "DROP\\s+TABLE"
      reason: "Destructive SQL"
    - pattern: "DROP\\s+DATABASE"
      reason: "Destructive SQL"
    - pattern: "DELETE\\s+FROM\\s+\\w+\\s*;"
      reason: "Unscoped delete (no WHERE clause)"
    - pattern: "killall|pkill|kill\\s+-9"
      reason: "Process kill"
    - pattern: "systemctl\\s+(stop|disable|mask)"
      reason: "Service stop"
    - pattern: "dd\\s+if="
      reason: "Raw disk operation"
    - pattern: "chmod\\s+777"
      reason: "Insecure permission set"
    - pattern: "curl.*\\|\\s*(bash|sh)"
      reason: "Remote code execution via pipe"
    - pattern: "(AWS_SECRET|API_KEY|PASSWORD|TOKEN)\\s*="
      reason: "Potential credential exposure"
